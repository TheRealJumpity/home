<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meto AI | Terminal Edition</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            background-color: #000; 
            margin: 0;
            color: white;
            overflow: hidden;
        }

        .display-area { text-align: center; margin-bottom: 60px; padding: 0 20px; }
        
        #status {
            font-size: 12px;
            color: #4488ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            height: 20px;
        }

        #transcript {
            font-size: 28px;
            font-weight: 300;
            color: #ffffff;
            min-height: 40px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .mic-container {
            position: fixed;
            bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .mic-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: #111;
            border: 1px solid #222;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            box-shadow: 0 0 0 rgba(68, 136, 255, 0);
        }

        .mic-btn svg { fill: #666; width: 35px; transition: 0.3s; }

        /* Состояние прослушивания */
        .listening {
            border-color: #4488ff;
            box-shadow: 0 0 40px rgba(68, 136, 255, 0.4);
            transform: scale(1.1);
        }

        .listening svg {
            fill: #4488ff;
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.6; }
        }

        .hover-hint {
            opacity: 0;
            font-size: 13px;
            color: #444;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .mic-container:hover .hover-hint { opacity: 1; }
    </style>
</head>
<body>

    <div class="display-area">
        <div id="status">System Idle</div>
        <div id="transcript">Listening for "Open..."</div>
    </div>

    <div class="mic-container">
        <button class="mic-btn" id="mic-btn">
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z""")/>>
            </svg>
        </button>
        <span class="hover-hint">Talk to Meto</span>
    </div>

    <script>
        // БАЗА ДАННЫХ КОМАНД (Легко дополнять)
        const APP_DATABASE = {
            "spotify": "https://spotify.com",
            "youtube": "https://youtube.com",
            "github": "https://github.com",
            "google": "https://google.com",
            "gmail": "https://google.com",
            "discord": "https://discord.com",
            "netflix": "https://netflix.com",
            "twitter": "https://twitter.com",
            "x": "https://x.com",
            "reddit": "https://reddit.com",
            "instagram": "https://instagram.com",
            "facebook": "https://facebook.com",
            "twitch": "https://twitch.tv",
            "chatgpt": "https://openai.com",
            "roblox": "https://roblox.com",
            "amazon": "https://amazon.com",
            "wikipedia": "https://wikipedia.org",
            "pinterest": "https://pinterest.com"
        };

        const btn = document.getElementById('mic-btn');
        const statusText = document.getElementById('status');
        const transcriptText = document.getElementById('transcript');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        if (!SpeechRecognition) {
            transcriptText.innerText = "Speech API not supported";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';

            btn.onclick = () => {
                try { recognition.start(); } catch(e) {}
            };

            recognition.onstart = () => {
                btn.classList.add('listening');
                statusText.innerText = "Meto is Listening";
                transcriptText.innerText = "...";
            };

            recognition.onresult = (event) => {
                const command = event.results[0].transcript.toLowerCase();
                transcriptText.innerText = `"${command}"`;
                handleVoiceCommand(command);
            };

            recognition.onend = () => {
                btn.classList.remove('listening');
                statusText.innerText = "System Idle";
            };
        }

        function speak(text) {
            synth.cancel(); // Остановить текущую речь, если есть
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.0;
            utterance.pitch = 0.9; // Чуть более глубокий голос
            synth.speak(utterance);
        }

        function handleVoiceCommand(cmd) {
            // Проверяем, начинается ли команда с "open"
            if (cmd.startsWith('open ')) {
                const target = cmd.replace('open ', '').trim();
                
                if (APP_DATABASE[target]) {
                    speak(`Opening ${target} for you.`);
                    // Небольшая задержка, чтобы браузер не блокировал окно после речи
                    setTimeout(() => {
                        window.open(APP_DATABASE[target], '_blank');
                    }, 500);
                } else {
                    speak("Sorry, I don't have that website in my database yet.");
                }
            } else {
                // Если команда не распознана или не "open"
                speak("Sorry, but for now I only support 'open' commands.");
            }
        }
    </script>
</body>
</html>
