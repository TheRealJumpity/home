<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meto AI | Welcome</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: space-between;
            height: 100vh; 
            background-color: #000; 
            margin: 0;
            color: white;
            padding: 40px 0;
            overflow: hidden;
        }

        /* Кнопки управления */
        .container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .nav-btn { 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            background-color: #111; 
            color: #00ffcc; 
            border: 2px solid #00ffcc; 
            border-radius: 8px;
            transition: 0.3s;
            text-decoration: none;
        }
        .nav-btn:hover { background-color: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }

        /* Текстовая область */
        .display-area { text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        #status { color: #4488ff; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; margin-bottom: 10px; font-weight: 300; }
        #transcript { font-size: 26px; font-weight: 300; min-height: 45px; color: #fff; opacity: 0.9; }

        /* Микрофон */
        .mic-container { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 20px; }
        .mic-btn {
            width: 75px; height: 75px; border-radius: 50%;
            background: #111; border: 2px solid #4488ff;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .mic-btn svg { fill: #4488ff; width: 32px; }
        .mic-btn.active { transform: scale(1.15); box-shadow: 0 0 35px rgba(68, 136, 255, 0.6); animation: breathe 2s infinite ease-in-out; }

        @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .hover-text { opacity: 0; font-size: 13px; color: #666; transition: 0.3s; letter-spacing: 1px; }
        .mic-container:hover .hover-text { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <button class="nav-btn" onclick="window.location.href='https://github.com'">GitHub</button>
        <button class="nav-btn" onclick="window.location.href='https://google.com'">Google</button>
        <button class="nav-btn" onclick="window.location.href='https://youtube.com'">YouTube</button>
        <button class="nav-btn" onclick="window.location.href='https://spotify.com'">Spotify</button>
    </div>

    <div class="display-area">
        <div id="status">Welcome, I'm Meto!</div>
        <div id="transcript">Ready for your command</div>
    </div>

    <div class="mic-container">
        <button class="mic-btn" id="start-btn">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z""")/>></svg>
        </button>
        <span class="hover-text">Talk to Meto</span>
    </div>

    <script>
        const APP_DB = {
            "spotify": "https://spotify.com",
            "github": "https://github.com",
            "google": "https://google.com",
            "youtube": "https://youtube.com"
        };

        const btn = document.getElementById('start-btn');
        const transcriptText = document.getElementById('transcript');
        const statusText = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        // Функция выбора более "человечного" голоса
        function getBestVoice() {
            const voices = synth.getVoices();
            // Ищем голоса Google или более современные варианты в системе
            return voices.find(v => v.name.includes('Google') && v.lang.includes('en')) || 
                   voices.find(v => v.lang.includes('en-US')) || 
                   voices[0];
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = getBestVoice();
            utterance.lang = 'en-US';
            utterance.pitch = 1.1; // Чуть выше для дружелюбности
            utterance.rate = 0.95; // Чуть медленнее для четкости
            synth.speak(utterance);
        }

        if (!SpeechRecognition) {
            transcriptText.innerText = "Mic not supported";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';

            btn.onclick = () => { 
                try { recognition.start(); } catch(e) {}
            };

            recognition.onstart = () => {
                btn.classList.add('active');
                statusText.innerText = "I'm listening...";
                transcriptText.innerText = "";
            };

            recognition.onresult = (event) => {
                const result = event.results[0].transcript.toLowerCase();
                transcriptText.innerText = `"${result}"`;
                handleCommand(result);
            };

            recognition.onend = () => {
                btn.classList.remove('active');
                statusText.innerText = "Welcome, I'm Meto!";
            };
        }

        function handleCommand(cmd) {
            if (cmd.includes('who are you')) {
                speak("I am Meto, your personal assistant. Nice to meet you!");
                return;
            }

            if (cmd.includes('open')) {
                let found = false;
                for (let app in APP_DB) {
                    if (cmd.includes(app)) {
                        speak(`Of course. Opening ${app} for you.`);
                        setTimeout(() => { window.open(APP_DB[app], '_blank'); }, 700);
                        found = true;
                        break;
                    }
                }
                if (!found) speak("I'm sorry, I don't have that website in my records yet.");
            } else {
                speak("Sorry, but for now I only support open commands.");
            }
        }

        // Предварительная загрузка голосов (некоторые браузеры загружают их асинхронно)
        window.speechSynthesis.onvoiceschanged = getBestVoice;
    </script>
</body>
</html>
