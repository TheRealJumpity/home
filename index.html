<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meto AI</title>
<style>
body{background:#0a0a0a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif}
#wave{width:150px;height:150px;border-radius:50%;background:cyan}
</style>
</head>
<body>

<div id="wave"></div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

let sites = {};

fetch('sites.json')
  .then(r => r.json())
  .then(d => {
    sites = d;
    console.log("SITES LOADED:", sites);
  })
  .catch(err => console.error("JSON FAILED:", err));

function speak(t){
  let u=new SpeechSynthesisUtterance(t);
  u.rate=0.9;u.pitch=0.8;
  speechSynthesis.speak(u);
}

function openSite(q){
  q=q.toLowerCase();

  for(let k in sites){
    if(q.includes(k)){
      speak("Opening "+k);
      window.open(sites[k],"_blank");
      return;
    }
  }

  speak("Searching "+q);
  window.open("https://google.com/search?q="+q);
}

function searchOnSite(site, term){
  if(site.includes("youtube"))
    window.open("https://youtube.com/results?search_query="+term);
  else if(site.includes("amazon"))
    window.open("https://www.amazon.com/s?k="+term);
  else
    window.open("https://google.com/search?q="+term);
}

function parse(text){
  text=text.toLowerCase();

  if(text.includes("search")){
    let clean=text.replace("search","").trim();
    let m=clean.match(/(.+?) on (.+)/);

    if(m){
      searchOnSite(m[2], m[1]);
    } else {
      window.open("https://google.com/search?q="+clean);
    }
    return;
  }

  if(text.includes("open")){
    let clean=text.replace("open","").trim();
    openSite(clean);
    return;
  }

  window.open("https://google.com/search?q="+text);
}

recognition.onresult=e=>{
  parse(e.results[0][0].transcript);
};

window.addEventListener("keydown",e=>{
  if(e.code==="Space") recognition.start();
});
</script>

</body>
</html>
