<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meto AI | Ultimate OS</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            background-color: #000; 
            margin: 0;
            color: white;
            overflow: hidden;
        }
        .header-clock { position: absolute; top: 40px; text-align: center; }
        #clock {
            font-size: 54px; font-weight: 200; letter-spacing: 7px;
            color: #fff; text-shadow: 0 0 20px rgba(68, 136, 255, 0.6);
            animation: clock-glow 4s infinite alternate;
        }
        .commands-dropdown { position: absolute; top: 40px; right: 40px; z-index: 10; }
        select {
            background: rgba(10, 10, 25, 0.95);
            color: #4488ff; border: 1px solid #4488ff; 
            padding: 12px 20px; border-radius: 10px;
            cursor: pointer; outline: none; font-size: 14px;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        select option { background: #000; color: #4488ff; }
        .display-area { text-align: center; margin-bottom: 20px; max-width: 80%; z-index: 5; }
        #status { font-size: 14px; color: #4488ff; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
        #transcript { font-size: 36px; font-weight: 200; min-height: 60px; color: #ffffff; }
        .visualizer {
            display: none; align-items: center; justify-content: center;
            gap: 5px; height: 50px; margin-bottom: 20px;
        }
        .bar {
            width: 4px; height: 10px; background: #4488ff;
            border-radius: 10px; animation: siri-wave 1s ease-in-out infinite;
        }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        .bar:nth-child(5) { animation-delay: 0.4s; }
        @keyframes siri-wave {
            0%, 100% { height: 10px; background: #4488ff; }
            50% { height: 40px; background: #00ffcc; box-shadow: 0 0 15px #4488ff; }
        }
        .mic-container { position: fixed; bottom: 70px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .mic-btn {
            width: 90px; height: 90px; border-radius: 50%;
            background: #111; border: 2px solid #333;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.4s;
        }
        .mic-btn svg { fill: #4488ff; width: 38px; }
        .mic-btn.active { border-color: #4488ff; box-shadow: 0 0 60px rgba(68, 136, 255, 0.4); transform: scale(1.1); }
        .instruction-text { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2.5px; text-align: center; }
        @keyframes clock-glow { from { opacity: 0.7; } to { opacity: 1; text-shadow: 0 0 40px rgba(68, 136, 255, 0.9); } }
    </style>
</head>
<body>

    <div class="header-clock"><div id="clock">00:00:00</div></div>

    <div class="commands-dropdown">
        <select id="cmd-list">
            <option disabled selected>Full Database</option>
            <option disabled>— Dialogues —</option>
            <option>Hi / Hello</option>
            <option>How is your day?</option>
            <option>What can you do?</option>
            <option>Who are you?</option>
            <option disabled>— Open Sites —</option>
        </select>
    </div>

    <div class="display-area">
        <div id="status">Welcome, I'm Meto!</div>
        <div id="transcript">Ready for your command</div>
    </div>

    <div class="visualizer" id="wave">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <div class="mic-container">
        <button class="mic-btn" id="mic-btn">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>></svg>
        </button>
        <span class="instruction-text">Press the microphone or hold spacebar and talk</span>
    </div>

    <script>
        const APP_DATABASE = {
            "spotify": "https://spotify.com", "youtube": "https://youtube.com", "github": "https://github.com",
            "google": "https://google.com", "gmail": "https://mail.google.com", "discord": "https://discord.com",
            "netflix": "https://netflix.com", "twitter": "https://twitter.com", "x": "https://x.com",
            "reddit": "https://reddit.com", "instagram": "https://instagram.com", "facebook": "https://facebook.com",
            "twitch": "https://twitch.tv", "chatgpt": "https://openai.com", "roblox": "https://roblox.com",
            "amazon": "https://amazon.com", "wikipedia": "https://wikipedia.org", "pinterest": "https://pinterest.com",
            "tiktok": "https://tiktok.com", "steam": "https://steampowered.com"
        };

        function tick() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }
        setInterval(tick, 1000); tick();

        const sel = document.getElementById('cmd-list');
        Object.keys(APP_DATABASE).sort().forEach(key => {
            let opt = document.createElement('option');
            opt.text = `Open ${key.charAt(0).toUpperCase() + key.slice(1)}`;
            sel.add(opt);
        });

        const btn = document.getElementById('mic-btn');
        const transcript = document.getElementById('transcript');
        const status = document.getElementById('status');
        const wave = document.getElementById('wave');
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        let recognition;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.onstart = () => { isListening = true; btn.classList.add('active'); wave.style.display = 'flex'; status.innerText = "Meto is listening..."; };
            recognition.onend = () => { isListening = false; btn.classList.remove('active'); wave.style.display = 'none'; status.innerText = "Welcome, I'm Meto!"; };
            recognition.onresult = (e) => {
                const cmd = e.results[e.results.length - 1].transcript.toLowerCase();
                transcript.innerText = `"${cmd}"`;
                processAI(cmd);
            };
        }

        function speak(text) {
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.pitch = 1.1; u.rate = 1.0;
            synth.speak(u);
        }

        function startListening() { if (!isListening) { try { recognition.start(); } catch(e) {} } }
        function stopListening() { if (isListening) { recognition.stop(); } }

        btn.onclick = () => { isListening ? stopListening() : startListening(); };
        window.onkeydown = (e) => { if (e.code === 'Space' && !isListening) { e.preventDefault(); startListening(); } };
        window.onkeyup = (e) => { if (e.code === 'Space' && isListening) { stopListening(); } };

        function processAI(cmd) {
            const words = cmd.split(/\s+/);
            if (words.includes('hi') || words.includes('hello')) {
                speak("Hello! How can I help you today?");
            } else if (cmd.includes('how is your day') || cmd.includes('how are you')) {
                speak("My day is excellent, thanks for asking!");
            } else if (cmd.includes('what can you do')) {
                speak("I can open websites from my database, tell you the time, and chat with you.");
            } else if (cmd.includes('who are you')) {
                speak("I am Meto, your personal AI assistant.");
            } else if (words.includes('open')) {
                let target = Object.keys(APP_DATABASE).find(site => words.includes(site));
                if (target) {
                    speak(`Of course. Opening ${target}.`);
                    setTimeout(() => { window.location.href = APP_DATABASE[target]; }, 1000);
                } else {
                    speak("I don't have that site in my database yet.");
                }
            } else {
                speak("Sorry, but for now I only support open commands.");
            }
        }
    </script>
</body>
</html>
