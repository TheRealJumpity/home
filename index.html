<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meto AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{
  height:100vh;
  background:linear-gradient(135deg,#0a0a0a,#111827);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
body::before{
  content:"";
  position:absolute;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(0,255,255,0.15),transparent 70%);
  filter:blur(80px);
  animation:float 6s infinite alternate ease-in-out;
}
@keyframes float{from{transform:translateY(-40px)}to{transform:translateY(40px)}}

.title{position:absolute;top:40px;font-size:32px;letter-spacing:2px;opacity:.9}

#wave{
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,#00f0ff,#0066ff);
  box-shadow:0 0 40px rgba(0,255,255,.6);
  transition:.2s ease;position:relative;
}
#wave.active{transform:scale(1.25);box-shadow:0 0 80px rgba(0,255,255,1)}
#wave::after{
  content:"";position:absolute;width:180px;height:180px;border-radius:50%;
  border:2px solid rgba(0,255,255,.4);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.8);opacity:0}}

#status{position:absolute;bottom:80px;font-size:18px;opacity:.8}
#log{position:absolute;bottom:40px;font-size:14px;opacity:.6;text-align:center}

.hints{
  position:absolute;right:30px;top:100px;
  background:rgba(255,255,255,0.05);
  padding:15px 20px;border-radius:12px;
  backdrop-filter:blur(10px);
  font-size:13px;line-height:1.6;
}
.hints span{color:#00f0ff}
</style>
</head>
<body>

<div class="title">METO</div>
<div id="wave"></div>
<div id="status">Hold SPACE to talk</div>
<div id="log">Ready</div>

<div class="hints">
  <div><span>open</span> youtube</div>
  <div><span>search</span> cats</div>
  <div><span>search</span> memes on youtube</div>
</div>

<script>
// ================= VOICE SETUP =================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.continuous = false;
recognition.interimResults = false;
recognition.lang = 'en-US';

// ================= UI =================
const wave = document.getElementById('wave');
const status = document.getElementById('status');
const log = document.getElementById('log');

// ================= VOICE FIX =================
let voices = [];
function loadVoices(){
  voices = speechSynthesis.getVoices();
}
loadVoices();
speechSynthesis.onvoiceschanged = loadVoices;

function getBestVoice(){
  // prioritize deeper / natural voices
  return voices.find(v => v.lang.includes('en') && (v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('deep') || v.name.toLowerCase().includes('natural'))) 
      || voices.find(v => v.lang.includes('en')) 
      || voices[0];
}

function speak(text){
  speechSynthesis.cancel(); // prevents robotic stacking

  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.85;   // slower = more natural
  utter.pitch = 0.8;   // deeper voice
  utter.volume = 1;

  const voice = getBestVoice();
  if(voice) utter.voice = voice;

  speechSynthesis.speak(utter);
}

// ================= DATABASE =================
let sites = {};
fetch('sites.json').then(r=>r.json()).then(d=>sites=d);

// ================= LOGIC =================
function findMatch(q){
  q=q.toLowerCase();
  for(const k in sites){
    if(k.includes(q)||q.includes(k)) return sites[k];
  }
  return null;
}

function delayedOpen(url){
  setTimeout(()=>{
    window.open(url,'_blank');
  }, 900); // delay added
}

function openSite(q){
  const match = findMatch(q);
  if(match){
    speak('Opening ' + q);
    delayedOpen(match);
  }else{
    fallback(q);
  }
}

function searchSite(site,term){
  if(site.includes('youtube')){
    speak('Searching YouTube');
    delayedOpen(`https://youtube.com/results?search_query=${term}`);
  }else{
    fallback(term);
  }
}

function fallback(q){
  speak('Trying to open ' + q);
  let clean=q.replace(/\s+/g,'');
  delayedOpen(`https://${clean}.com`);
}

function parse(text){
  text=text.toLowerCase().trim();
  log.textContent='Heard: '+text;

  if(text.startsWith('hey meto')) text=text.replace('hey meto','').trim();

  let open=text.match(/(open|go to|launch)\s(.+)/);
  let search=text.match(/search\s(.+)\s(on\s(.+))?/);

  if(open){openSite(open[2]);return}
  if(search){
    if(search[3]) searchSite(search[3],search[1]);
    else{
      speak('Searching ' + search[1]);
      delayedOpen(`https://google.com/search?q=${search[1]}`);
    }
    return;
  }

  fallback(text);
}

// ================= EVENTS =================
recognition.onresult=e=>{
  const text=e.results[0][0].transcript;
  parse(text);
}

recognition.onend=()=>{
  wave.classList.remove('active');
  status.textContent='Hold SPACE to talk';
}

let holding=false;
window.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!holding){
    holding=true;
    wave.classList.add('active');
    status.textContent='Listening...';
    recognition.start();
  }
});

window.addEventListener('keyup',e=>{
  if(e.code==='Space'){
    holding=false;
    status.textContent='Processing...';
  }
});
</script>

</body>
</html>
