<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meto AI Intro</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}

/* SVG container */
#intro {
  width: 300px;
  height: 150px;
  position: relative;
}

/* Main Meto UI hidden initially */
#mainUI {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}

/* Fade out animation */
@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}
</style>
</head>
<body>

<!-- Intro animation SVG -->
<div id="intro">
  <svg viewBox="0 0 300 150" width="300" height="150">
    <!-- Smile path -->
    <path id="smile" d="M60,90 Q150,140 240,90" stroke="#00f0ff" stroke-width="4" fill="transparent"/>
    <!-- METO handwritten text (hidden initially) -->
    <text id="metoText" x="50%" y="90" text-anchor="middle" fill="#00f0ff" font-size="48" font-family="Segoe Script, cursive" opacity="0">METO</text>
  </svg>
</div>

<!-- MAIN METO UI -->
<div id="mainUI">
  <div class="title">METO</div>
  <div id="wave-container">
    <div class="outer-circle"></div>
    <div class="outer-circle"></div>
    <div class="outer-circle"></div>
    <div id="wave"></div>
  </div>
  <div id="status">Hold SPACE to talk</div>
  <div id="log">Ready</div>
</div>

<script>
// Animate the smile into METO text
const smile = document.getElementById('smile');
const metoText = document.getElementById('metoText');
const mainUI = document.getElementById('mainUI');

// Get total length of the path for stroke animation
const length = smile.getTotalLength();
smile.style.strokeDasharray = length;
smile.style.strokeDashoffset = length;

// Animation: draw smile
smile.animate([{ strokeDashoffset: length }, { strokeDashoffset: 0 }], {
  duration: 1000,
  easing: 'ease-in-out',
  fill: 'forwards'
}).onfinish = () => {
  // Morph smile to METO text (fade out smile, fade in text)
  smile.style.transition = 'opacity 0.5s';
  smile.style.opacity = 0;

  metoText.style.transition = 'opacity 0.5s';
  metoText.style.opacity = 1;

  // Keep text for 1.75s then fade out
  setTimeout(() => {
    metoText.style.animation = 'fadeOut 0.5s forwards';
    // After fade out, show main UI
    setTimeout(() => {
      document.getElementById('intro').style.display = 'none';
      mainUI.style.opacity = 1;
      mainUI.style.pointerEvents = 'auto';
    }, 500);
  }, 1750);
});

// ================= METO UI SPEECH & LOGIC =================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'en-US';

const wave = document.getElementById('wave');
const status = document.getElementById('status');
const log = document.getElementById('log');

let selectedVoice = null;
function loadVoice(){
  const voices = speechSynthesis.getVoices();
  selectedVoice = voices.find(v => v.lang.startsWith('en') && /female|Google UK English|Samantha/i.test(v.name)) || voices[0];
}
speechSynthesis.onvoiceschanged = loadVoice;

function speak(text){
  if(!selectedVoice) loadVoice();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.voice = selectedVoice;
  utterance.rate = 0.95;
  utterance.pitch = 1.1;
  utterance.volume = 1;
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
  status.textContent = "Speaking...";
  utterance.onend = () => status.textContent = "Ready";
}

// Load sites.json
let sites = {};
fetch('sites.json')
  .then(r => r.json())
  .then(d => sites = d);

// Core functions
function openSite(q){
  for(let k in sites){
    if(q.includes(k)){
      speak("Opening " + k);
      setTimeout(()=>window.open(sites[k], "_blank"), 800);
      return;
    }
  }
  speak("Searching " + q);
  setTimeout(()=>window.open(`https://google.com/search?q=${q}`), 800);
}

function searchOnSite(site, term){
  if(site.includes("youtube")) window.open(`https://youtube.com/results?search_query=${term}`);
  else if(site.includes("amazon")) window.open(`https://www.amazon.com/s?k=${term}`);
  else window.open(`https://google.com/search?q=${term}`);
}

function parse(text){
  text = text.toLowerCase();
  log.textContent = "Heard: " + text;

  if(text.includes("search")){
    let clean = text.replace("search","").trim();
    let m = clean.match(/(.+?) on (.+)/);
    if(m){
      speak("Searching " + m[1]);
      searchOnSite(m[2], m[1]);
    } else {
      speak("Searching " + clean);
      window.open(`https://google.com/search?q=${clean}`);
    }
    return;
  }

  if(text.includes("open")){
    let clean = text.replace("open","").trim();
    openSite(clean);
    return;
  }

  speak("Searching " + text);
  window.open(`https://google.com/search?q=${text}`);
}

recognition.onresult = e => parse(e.results[0][0].transcript);
recognition.onend = () => {
  wave.classList.remove('active');
  status.textContent = "Hold SPACE to talk";
};

window.addEventListener("keydown", e=>{
  if(e.code==="Space"){
    wave.classList.add('active');
    status.textContent = "Listening...";
    recognition.start();
  }
});

window.addEventListener("keyup", e=>{
  if(e.code==="Space"){
    status.textContent = "Processing...";
  }
});
</script>
</body>
</html>
