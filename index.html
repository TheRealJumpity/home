<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meto AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
  height:100vh;
  background:linear-gradient(135deg,#0a0a0a,#111827);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

body::before{
  content:"";
  position:absolute;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(0,255,255,0.15),transparent 70%);
  filter:blur(80px);
  animation:float 6s infinite alternate ease-in-out;
}

@keyframes float{
  from{transform:translateY(-40px)}
  to{transform:translateY(40px)}
}

.title{
  position:absolute;
  top:40px;
  font-size:32px;
  letter-spacing:2px;
}

#wave{
  width:180px;height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#00f0ff,#0066ff);
  box-shadow:0 0 40px rgba(0,255,255,.6);
  transition:.2s;
}

#wave.active{
  transform:scale(1.3);
  box-shadow:0 0 80px rgba(0,255,255,1);
}

#status{
  position:absolute;
  bottom:80px;
  font-size:18px;
}

#log{
  position:absolute;
  bottom:40px;
  font-size:14px;
  opacity:.7;
}

</style>
</head>
<body>

<div class="title">METO</div>
<div id="wave"></div>
<div id="status">Hold SPACE to talk</div>
<div id="log">Ready</div>

<script>
// ================= SPEECH =================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'en-US';

const wave = document.getElementById('wave');
const status = document.getElementById('status');
const log = document.getElementById('log');

// ================= VOICE =================
function speak(text){
  speechSynthesis.cancel();
  let u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9;
  u.pitch = 0.8;
  speechSynthesis.speak(u);
}

// ================= LOAD SITES =================
let sites = {};

fetch('sites.json')
  .then(r => r.json())
  .then(d => {
    sites = d;
    console.log("LOADED:", sites);
  })
  .catch(err => console.error("JSON ERROR:", err));

// ================= CORE =================
function openSite(q){
  for(let k in sites){
    if(q.includes(k)){
      speak("Opening " + k);
      setTimeout(()=>window.open(sites[k],"_blank"), 800);
      return;
    }
  }

  speak("Searching " + q);
  setTimeout(()=>window.open(`https://google.com/search?q=${q}`),800);
}

function searchOnSite(site, term){
  if(site.includes("youtube"))
    window.open(`https://youtube.com/results?search_query=${term}`);
  else if(site.includes("amazon"))
    window.open(`https://www.amazon.com/s?k=${term}`);
  else
    window.open(`https://google.com/search?q=${term}`);
}

// ================= PARSER =================
function parse(text){
  text = text.toLowerCase();
  log.textContent = "Heard: " + text;

  if(text.includes("search")){
    let clean = text.replace("search","").trim();
    let m = clean.match(/(.+?) on (.+)/);

    if(m){
      speak("Searching " + m[1]);
      searchOnSite(m[2], m[1]);
    } else {
      speak("Searching " + clean);
      window.open(`https://google.com/search?q=${clean}`);
    }
    return;
  }

  if(text.includes("open")){
    let clean = text.replace("open","").trim();
    openSite(clean);
    return;
  }

  speak("Searching " + text);
  window.open(`https://google.com/search?q=${text}`);
}

// ================= EVENTS =================
recognition.onresult = e => {
  parse(e.results[0][0].transcript);
};

recognition.onend = () => {
  wave.classList.remove('active');
  status.textContent = "Hold SPACE to talk";
};

window.addEventListener("keydown", e=>{
  if(e.code==="Space"){
    wave.classList.add('active');
    status.textContent = "Listening...";
    recognition.start();
  }
});

window.addEventListener("keyup", e=>{
  if(e.code==="Space"){
    status.textContent = "Processing...";
  }
});
</script>

</body>
</html>
