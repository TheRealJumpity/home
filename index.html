<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meto AI | Control Panel</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: space-between;
            height: 100vh; 
            background-color: #000; 
            margin: 0;
            color: white;
            padding: 40px 0;
            overflow: hidden;
        }

        /* ТЕ САМЫЕ КНОПКИ СВЕРХУ */
        .container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .nav-btn { 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            background-color: #111; 
            color: #00ffcc; 
            border: 2px solid #00ffcc; 
            border-radius: 8px;
            transition: 0.3s;
            text-decoration: none;
        }
        .nav-btn:hover { background-color: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }

        /* ИНДИКАТОР ТЕКСТА */
        .display-area { text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        #status { color: #4488ff; letter-spacing: 2px; text-transform: uppercase; font-size: 12px; margin-bottom: 10px; }
        #transcript { font-size: 24px; font-weight: 300; min-height: 40px; color: #fff; }

        /* МИКРОФОН СНИЗУ */
        .mic-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
        .mic-btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: #111; border: 2px solid #4488ff;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .mic-btn svg { fill: #4488ff; width: 30px; }
        .mic-btn.active { transform: scale(1.2); box-shadow: 0 0 30px #4488ff; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .hover-text { opacity: 0; font-size: 14px; color: #555; transition: 0.3s; }
        .mic-container:hover .hover-text { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <button class="nav-btn" onclick="window.location.href='https://github.com'">GitHub</button>
        <button class="nav-btn" onclick="window.location.href='https://google.com'">Google</button>
        <button class="nav-btn" onclick="window.location.href='https://youtube.com'">YouTube</button>
        <button class="nav-btn" onclick="window.location.href='https://spotify.com'">Spotify</button>
    </div>

    <div class="display-area">
        <div id="status">System Ready</div>
        <div id="transcript">Click mic to talk</div>
    </div>

    <div class="mic-container">
        <button class="mic-btn" id="start-btn">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z""")/>></svg>
        </button>
        <span class="hover-text">Talk to Meto</span>
    </div>

    <script>
        const APP_DB = {
            "spotify": "https://spotify.com",
            "github": "https://github.com",
            "google": "https://google.com",
            "youtube": "https://youtube.com"
        };

        const btn = document.getElementById('start-btn');
        const transcriptText = document.getElementById('transcript');
        const statusText = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        if (!SpeechRecognition) {
            transcriptText.innerText = "Browser not supported";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';

            btn.onclick = () => { recognition.start(); };

            recognition.onstart = () => {
                btn.classList.add('active');
                statusText.innerText = "Listening...";
            };

            recognition.onresult = (event) => {
                const result = event.results[0][0].transcript.toLowerCase();
                transcriptText.innerText = `"${result}"`;
                handleCommand(result);
            };

            recognition.onend = () => {
                btn.classList.remove('active');
                statusText.innerText = "System Ready";
            };
        }

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            synth.speak(u);
        }

        function handleCommand(cmd) {
            // Кто ты?
            if (cmd.includes('who are you') || cmd.includes('what is your name')) {
                speak("I am Meto, your AI assistant.");
                return;
            }

            // Логика OPEN
            if (cmd.includes('open')) {
                let found = false;
                for (let app in APP_DB) {
                    if (cmd.includes(app)) {
                        speak(`Opening ${app}`);
                        setTimeout(() => { window.open(APP_DB[app], '_blank'); }, 500);
                        found = true;
                        break;
                    }
                }
                if (!found) speak("Sorry, I don't have that site in my database.");
            } else {
                // Если нет слова open
                speak("Sorry, but for now I only support 'open' commands.");
            }
        }
    </script>
</body>
</html>
