<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meto AI Assistant</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            background-color: #000; 
            margin: 0;
            color: white;
            overflow: hidden;
        }

        /* Выпадающий список команд */
        .commands-dropdown {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        select {
            background: #111;
            color: #4488ff;
            border: 1px solid #4488ff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
            font-size: 14px;
        }

        /* Центральная область */
        .display-area { text-align: center; margin-bottom: 80px; }
        
        #status {
            font-size: 16px;
            color: #4488ff;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 300;
        }

        #transcript {
            font-size: 32px;
            font-weight: 300;
            color: #ffffff;
            min-height: 45px;
            text-shadow: 0 0 15px rgba(68, 136, 255, 0.3);
        }

        /* Микрофон */
        .mic-container {
            position: fixed;
            bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .mic-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: #111;
            border: 2px solid #222;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .mic-btn svg { fill: #4488ff; width: 35px; }

        .mic-btn.active {
            border-color: #4488ff;
            box-shadow: 0 0 40px rgba(68, 136, 255, 0.4);
            transform: scale(1.1);
        }

        .mic-btn.active svg {
            animation: pulse-icon 1.5s infinite ease-in-out;
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        .hover-hint { font-size: 12px; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- Список поддерживаемых команд -->
    <div class="commands-dropdown">
        <select id="cmd-list">
            <option disabled selected>Supported Sites</option>
            <!-- Заполнится автоматически из JS -->
        </select>
    </div>

    <div class="display-area">
        <div id="status">Welcome, I'm Meto!</div>
        <div id="transcript">Ready for your command</div>
    </div>

    <div class="mic-container">
        <button class="mic-btn" id="mic-btn">
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z""")/>>
            </svg>
        </button>
        <span class="hover-hint">Talk to Meto</span>
    </div>

    <script>
        const APP_DATABASE = {
            "spotify": "https://spotify.com",
            "youtube": "https://youtube.com",
            "github": "https://github.com",
            "google": "https://google.com",
            "gmail": "https://google.com",
            "discord": "https://discord.com",
            "netflix": "https://netflix.com",
            "twitter": "https://twitter.com",
            "x": "https://x.com",
            "reddit": "https://reddit.com",
            "instagram": "https://instagram.com",
            "facebook": "https://facebook.com",
            "twitch": "https://twitch.tv",
            "chatgpt": "https://openai.com",
            "roblox": "https://roblox.com",
            "amazon": "https://amazon.com",
            "wikipedia": "https://wikipedia.org",
            "pinterest": "https://pinterest.com"
        };

        // Заполнение выпадающего списка
        const dropdown = document.getElementById('cmd-list');
        Object.keys(APP_DATABASE).forEach(site => {
            let option = document.createElement('option');
            option.text = `Open ${site}`;
            dropdown.add(option);
        });

        const btn = document.getElementById('mic-btn');
        const statusText = document.getElementById('status');
        const transcriptText = document.getElementById('transcript');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        function speak(text) {
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.pitch = 1.1;
            u.rate = 1.0;
            // Пытаемся найти приятный голос
            const voices = synth.getVoices();
            u.voice = voices.find(v => v.name.includes('Google') && v.lang.includes('en')) || voices[0];
            synth.speak(u);
        }

        if (!SpeechRecognition) {
            transcriptText.innerText = "Mic not supported";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;

            btn.onclick = () => {
                try { recognition.start(); } catch(e) {}
            };

            recognition.onstart = () => {
                btn.classList.add('active');
                statusText.innerText = "I'm listening...";
                transcriptText.innerText = "";
            };

            recognition.onresult = (event) => {
                const command = event.results[0][0].transcript.toLowerCase();
                transcriptText.innerText = `"${command}"`;
                handleCommand(command);
            };

            recognition.onend = () => {
                btn.classList.remove('active');
                statusText.innerText = "Welcome, I'm Meto!";
            };
        }

        function handleCommand(cmd) {
            if (cmd.includes('who are you')) {
                speak("I am Meto, your personal assistant.");
                return;
            }

            if (cmd.includes('open')) {
                let found = false;
                for (let site in APP_DATABASE) {
                    if (cmd.includes(site)) {
                        speak(`Of course. Opening ${site} for you.`);
                        setTimeout(() => {
                            window.open(APP_DATABASE[site], '_blank');
                        }, 600);
                        found = true;
                        break;
                    }
                }
                if (!found) speak("I'm sorry, I don't have that website in my database yet.");
            } else {
                speak("Sorry, but for now I only support 'open' commands.");
            }
        }

        // Фикс для загрузки голосов в Chrome
        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
