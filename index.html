<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meto AI | Ultimate OS</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #000;
    margin: 0;
    color: white;
}

/* CLOCK */
.header-clock { position: absolute; top: 40px; }
#clock { font-size: 54px; letter-spacing: 7px; }

/* DISPLAY */
.display-area { text-align: center; }
#status { color: #4488ff; letter-spacing: 3px; }
#transcript { font-size: 32px; }

/* MIC */
.mic-container { position: fixed; bottom: 70px; text-align: center; }
.mic-btn {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: #111;
    border: 2px solid #333;
    cursor: pointer;
}
.mic-btn.active {
    border-color: #4488ff;
    box-shadow: 0 0 40px #4488ff;
}

/* POPUP */
#startup-popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.popup-box {
    background: #111;
    border: 1px solid #4488ff;
    border-radius: 16px;
    padding: 30px;
    width: 320px;
    text-align: center;
    box-shadow: 0 0 40px rgba(68,136,255,0.4);
}

.popup-box h2 {
    color: #4488ff;
}

.popup-box p {
    color: #ccc;
}

#activate-btn {
    background: #4488ff;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="startup-popup">
    <div class="popup-box">
        <h2>Microphone Activation Required</h2>
        <p>Click anywhere to activate Meto AI voice system.</p>
        <button id="activate-btn">Activate</button>
    </div>
</div>

<!-- CLOCK -->
<div class="header-clock"><div id="clock"></div></div>

<!-- DISPLAY -->
<div class="display-area">
    <div id="status">Say "Hey Meto"</div>
    <div id="transcript"></div>
</div>

<!-- MIC -->
<div class="mic-container">
    <button class="mic-btn" id="mic-btn">🎤</button>
</div>

<script>
const synth = window.speechSynthesis;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

const transcript = document.getElementById('transcript');
const status = document.getElementById('status');
const btn = document.getElementById('mic-btn');

let recognition;
let isListening = false;
let activated = false;

/* CLOCK */
setInterval(() => {
    document.getElementById('clock').innerText =
        new Date().toLocaleTimeString();
}, 1000);

/* SPEAK */
function speak(text) {
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    synth.speak(u);
}

/* PARSE SITE */
function extractSite(cmd) {
    cmd = cmd.replace("open", "").replace("go to", "").trim();

    if (cmd.includes(".")) return cmd;

    const map = {
        youtube: "youtube.com",
        google: "google.com",
        discord: "discord.com",
        roblox: "roblox.com"
    };

    for (let key in map) {
        if (cmd.includes(key)) return map[key];
    }

    return null;
}

/* OPEN ANYTHING */
function openAnything(cmd) {
    let site = extractSite(cmd);

    if (site) {
        if (!site.startsWith("http")) site = "https://" + site;
        speak("Opening " + site);
        window.location.href = site;
    } else {
        speak("Searching for " + cmd);
        window.location.href =
            "https://www.google.com/search?q=" + encodeURIComponent(cmd);
    }
}

/* AI */
function handleAI(cmd) {

    if (!activated) {
        if (cmd.includes("hey meto")) {
            activated = true;
            speak("Yes?");
            status.innerText = "Listening...";
        }
        return;
    }

    if (cmd.includes("open") || cmd.includes("go to")) {
        openAnything(cmd);
    }
    else if (cmd.includes("time")) {
        speak("The time is " + new Date().toLocaleTimeString());
    }
    else {
        speak("Try saying open plus a website.");
    }

    activated = false;
    status.innerText = "Say 'Hey Meto'";
}

/* SPEECH SETUP */
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = true;

    recognition.onresult = (e) => {
        const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
        transcript.innerText = cmd;
        handleAI(cmd);
    };

    recognition.onstart = () => {
        isListening = true;
        btn.classList.add("active");
    };

    recognition.onend = () => {
        isListening = false;
        btn.classList.remove("active");
        recognition.start();
    };
}

/* BUTTON */
btn.onclick = () => {
    if (!isListening) recognition.start();
};

/* POPUP ACTIVATION */
const popup = document.getElementById('startup-popup');
const activateBtn = document.getElementById('activate-btn');

function activateSite() {
    popup.style.display = "none";
    if (recognition && !isListening) {
        try { recognition.start(); } catch {}
    }
}

activateBtn.onclick = activateSite;
popup.onclick = activateSite;

</script>

</body>
</html>
