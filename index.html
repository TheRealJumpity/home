<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Popup Сайт</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <button onclick="openPopup()">Открыть окно</button>

    <script>
        function openPopup() {
            // Замените URL на нужный вам
            const url = 'https://google.com';
            const windowName = 'popupWindow';
            const features = 'width=600,height=400,left=200,top=200,menubar=no,toolbar=no,location=no,status=no';
            
            window.open(url, windowName, features);
        }
    </script>

</body>
</html>
